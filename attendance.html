!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f6ff;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  color: #4a90e2;
}

form {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}

input, select, button {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

input, select {
  flex: 1;
  min-width: 150px;
}

button {
  background: #4a90e2;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #357bd8;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

.present {
  color: green;
  font-weight: bold;
}

.absent {
  color: red;
  font-weight: bold;
}

.action-btn {
  padding: 5px 8px;
  margin: 2px;
  font-size: 12px;
}

#downloadBtn {
  margin-top: 15px;
  background: #28a745;
  color: white;
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

#downloadBtn:hover {
  background: #1e7e34;
}

@media (max-width: 600px) {
  form {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Attendance Tracker</h1>

  <form id="attendanceForm">
    <input type="text" id="name" placeholder="Student Name" required>
    <input type="text" id="className" placeholder="Class Name" required>
    <input type="date" id="date" readonly>
    <select id="status">
      <option value="Present">Present</option>
      <option value="Absent">Absent</option>
    </select>
    <button type="submit">Add Student</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Class</th>
        <th>Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
  </table>
  
  <button id="downloadBtn">Download CSV</button>
</div>

<script>
// Load saved students from localStorage
let students = JSON.parse(localStorage.getItem("students")) || [];

// Auto-fill today's date
function getToday() {
  return new Date().toISOString().split("T")[0];
}
document.getElementById("date").value = getToday();

const form = document.getElementById("attendanceForm");
const table = document.getElementById("attendanceTable");

// Save students to localStorage
function saveData() {
  localStorage.setItem("students", JSON.stringify(students));
}

// Display students in table
function displayStudents() {
  table.innerHTML = "";
  students.forEach((student, index) => {
    let row = `
      <tr>
        <td>${student.name}</td>
        <td>${student.className}</td>
        <td>${student.date}</td>
        <td class="${student.status === 'Present' ? 'present' : 'absent'}">${student.status}</td>
        <td>
          <button class="action-btn" onclick="toggleStatus(${index})">Toggle</button>
          <button class="action-btn" onclick="deleteStudent(${index})">Delete</button>
        </td>
      </tr>
    `;
    table.innerHTML += row;
  });
}

// Add new student
form.addEventListener("submit", function(e) {
  e.preventDefault();
  let newStudent = {
    name: document.getElementById("name").value,
    className: document.getElementById("className").value,
    date: getToday(), // always use current date
    status: document.getElementById("status").value
  };
  students.push(newStudent);
  saveData();
  displayStudents();
  form.reset();
  document.getElementById("date").value = getToday();
});

// Toggle Present/Absent
function toggleStatus(index) {
  students[index].status = students[index].status === "Present" ? "Absent" : "Present";
  saveData();
  displayStudents();
}

// Delete student
function deleteStudent(index) {
  students.splice(index, 1);
  saveData();
  displayStudents();
}

// Download CSV
document.getElementById("downloadBtn").addEventListener("click", function() {
  if(students.length === 0) {
    alert("No students to download!");
    return;
  }
  let csv = "Name,Class,Date,Status\n";
  students.forEach(student => {
    csv += `${student.name},${student.className},${student.date},${student.status}\n`;
  });
  const hiddenElement = document.createElement("a");
  hiddenElement.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  hiddenElement.download = "attendance_list.csv";
  hiddenElement.click();
});

// Display students on page load
displayStudents();
</script>

</body>
</html>
