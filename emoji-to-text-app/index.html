<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji to Text Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Emoji → Text Converter</h1>

    <textarea id="emojiInput" placeholder="Type or paste emojis here..."></textarea>
    <button id="convertBtn">Convert to Text</button>

    <h2>Output:</h2>
    <textarea id="textOutput" readonly placeholder="Converted text will appear here"></textarea>

    <button id="copyBtn">Copy to Clipboard</button>
</div>

<script src="script.js"></script>
</body>
</html>
